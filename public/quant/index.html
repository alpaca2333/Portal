<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quant Dashboard — 量化研究工作台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3347;
      --accent: #6366f1;
      --accent2: #22d3ee;
      --green: #ef4444;
      --red: #10b981;
      --text: #e2e8f0;
      --muted: #64748b;
    }
    * { box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      margin: 0;
      min-height: 100vh;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    .tab-btn {
      padding: 8px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      background: transparent;
      color: var(--muted);
    }
    .tab-btn.active {
      background: var(--accent);
      color: #fff;
    }
    .tab-btn:hover:not(.active) {
      background: var(--surface2);
      color: var(--text);
    }
    .input-field {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 10px 14px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }
    .input-field:focus { border-color: var(--accent); }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .stat-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      text-align: center;
    }
    .stat-value { font-size: 22px; font-weight: 700; }
    .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .positive { color: var(--green); }
    .negative { color: var(--red); }
    .neutral { color: var(--accent2); }
    .autocomplete-list {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-top: 4px;
      z-index: 100;
      max-height: 200px;
      overflow-y: auto;
    }
    .autocomplete-item {
      padding: 10px 14px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s;
    }
    .autocomplete-item:hover { background: var(--border); }
    .loading-spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .period-btn {
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      transition: all 0.15s;
    }
    .period-btn.active, .period-btn:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    #chart-container, #backtest-chart-container {
      width: 100%;
      height: 480px;
    }
    @media (max-width: 640px) {
      #chart-container, #backtest-chart-container { height: 320px; }
      .stat-value { font-size: 18px; }
    }
    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }
    .tag-sh { background: #1e3a5f; color: #60a5fa; }
    .tag-sz { background: #1a3a2a; color: #34d399; }
    .tag-bj { background: #3a2a1a; color: #fb923c; }
    .scrollbar-thin::-webkit-scrollbar { width: 4px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    /* Strategy dropdown */
    .strategy-dropdown {
      position: relative;
      min-width: 260px;
    }
    .strategy-trigger {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 14px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text);
      transition: border-color 0.2s;
      user-select: none;
    }
    .strategy-trigger:hover { border-color: var(--accent); }
    .strategy-trigger.open { border-color: var(--accent); border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
    .strategy-trigger .chevron {
      transition: transform 0.2s;
      color: var(--muted);
      flex-shrink: 0;
    }
    .strategy-trigger.open .chevron { transform: rotate(180deg); }
    .strategy-panel {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--surface2);
      border: 1px solid var(--accent);
      border-top: none;
      border-bottom-left-radius: 8px;
      border-bottom-right-radius: 8px;
      z-index: 200;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .strategy-panel.open { display: block; }
    .strategy-item {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
      padding: 8px 14px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text);
      transition: background 0.15s;
      border-bottom: 1px solid var(--border);
    }
    .strategy-item:last-child { border-bottom: none; }
    .strategy-item:hover { background: rgba(99,102,241,0.1); }
    .strategy-item.active { background: rgba(99,102,241,0.18); }
    .strategy-item .s-name {
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }
    .strategy-item .s-annual {
      font-size: 11px;
      font-weight: 600;
      padding: 1px 7px;
      border-radius: 3px;
      letter-spacing: 0.02em;
    }
    .s-annual.pos { background: rgba(239,68,68,0.15); color: var(--green); }
    .s-annual.neg { background: rgba(16,185,129,0.15); color: var(--red); }
    .s-annual.loading { background: var(--border); color: var(--muted); }
    /* Markdown report styles */
    .md-report h1, .md-report h2, .md-report h3 { color: var(--text); font-weight: 700; margin: 1.2em 0 0.5em; }
    .md-report h1 { font-size: 1.3em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
    .md-report h2 { font-size: 1.1em; }
    .md-report h3 { font-size: 1em; }
    .md-report p { color: #cbd5e1; line-height: 1.7; margin: 0.5em 0; font-size: 13px; }
    .md-report ul, .md-report ol { color: #cbd5e1; padding-left: 1.5em; font-size: 13px; line-height: 1.7; }
    .md-report li { margin: 0.2em 0; }
    .md-report code { background: var(--surface2); color: var(--accent2); padding: 1px 5px; border-radius: 4px; font-size: 12px; font-family: monospace; }
    .md-report pre { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; overflow-x: auto; margin: 0.8em 0; }
    .md-report pre code { background: none; padding: 0; color: #e2e8f0; font-size: 12px; }
    .md-report blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: var(--muted); margin: 0.8em 0; font-style: italic; }
    .md-report table { width: 100%; border-collapse: collapse; font-size: 12px; margin: 0.8em 0; }
    .md-report th { background: var(--surface2); color: var(--muted); font-weight: 600; padding: 8px 12px; text-align: left; border: 1px solid var(--border); }
    .md-report td { padding: 7px 12px; border: 1px solid var(--border); color: #cbd5e1; }
    .md-report tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
    .md-report a { color: var(--accent2); text-decoration: underline; }
    .md-report hr { border: none; border-top: 1px solid var(--border); margin: 1.2em 0; }

    /* Monthly calendar heatmap */
    .cal-year-block { margin-bottom: 24px; }
    .cal-year-label { font-size: 13px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
    .cal-grid {
      display: grid;
      grid-template-columns: 48px repeat(12, 1fr);
      gap: 3px;
      align-items: center;
    }
    .cal-header-cell {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      padding: 2px 0;
      font-weight: 500;
    }
    .cal-row-label {
      font-size: 11px;
      color: var(--muted);
      text-align: right;
      padding-right: 8px;
      white-space: nowrap;
    }
    .cal-cell {
      border-radius: 5px;
      padding: 5px 2px;
      text-align: center;
      font-size: 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'PingFang SC', 'Helvetica Neue', sans-serif;
      font-weight: 500;
      letter-spacing: 0.01em;
      cursor: default;
      transition: transform 0.1s, box-shadow 0.1s;
      min-height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .cal-cell:hover {
      transform: scale(1.08);
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      z-index: 10;
    }
    .cal-cell.empty {
      background: rgba(255,255,255,0.03);
      color: transparent;
    }
    /* Red shades for positive (涨) */
    .cal-pos-1 { background: rgba(239,68,68,0.15); color: #f87171; }
    .cal-pos-2 { background: rgba(239,68,68,0.28); color: #ef4444; }
    .cal-pos-3 { background: rgba(239,68,68,0.45); color: #fca5a5; }
    .cal-pos-4 { background: rgba(239,68,68,0.65); color: #fff; }
    .cal-pos-5 { background: rgba(239,68,68,0.85); color: #fff; }
    /* Green shades for negative (跌) */
    .cal-neg-1 { background: rgba(16,185,129,0.15); color: #34d399; }
    .cal-neg-2 { background: rgba(16,185,129,0.28); color: #10b981; }
    .cal-neg-3 { background: rgba(16,185,129,0.45); color: #6ee7b7; }
    .cal-neg-4 { background: rgba(16,185,129,0.65); color: #fff; }
    .cal-neg-5 { background: rgba(16,185,129,0.85); color: #fff; }
    /* Legend */
    .cal-legend {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .cal-legend-swatch {
      width: 18px; height: 14px;
      border-radius: 3px;
      display: inline-block;
    }
    /* Row selector tabs */
    .cal-row-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .cal-row-tab {
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      transition: all 0.15s;
    }
    .cal-row-tab.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .cal-row-tab:hover:not(.active) {
      background: var(--surface2);
      color: var(--text);
    }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header style="background: var(--surface); border-bottom: 1px solid var(--border);">
  <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div style="width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
          <polyline points="16 7 22 7 22 13"/>
        </svg>
      </div>
      <div>
        <h1 class="text-base font-bold" style="color:var(--text);">Quant Dashboard</h1>
        <p class="text-xs" style="color:var(--muted);">量化研究工作台</p>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <span class="text-xs px-2 py-1 rounded" style="background:var(--surface2);color:var(--green);">
        ● 5489 只股票
      </span>
      <span class="text-xs px-2 py-1 rounded" style="background:var(--surface2);color:var(--muted);">
        2006 – 2026
      </span>
    </div>
  </div>
</header>

<!-- ── Global loading banner ── -->
<div id="db-banner" style="background:#1e2235;border-bottom:1px solid var(--border);display:none;">
  <div class="max-w-7xl mx-auto px-4 py-2 flex items-center gap-3 flex-wrap">
    <div class="loading-spinner" style="width:14px;height:14px;border-width:2px;"></div>
    <span class="text-xs" style="color:var(--accent2);">数据库加载中，请稍候…</span>
    <div style="flex:1;min-width:120px;max-width:300px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;">
      <div id="db-progress-bar" style="height:100%;width:0%;background:var(--accent);border-radius:2px;transition:width 0.5s;"></div>
    </div>
    <span id="db-progress-text" class="text-xs" style="color:var(--muted);">0 / 14,230,250 行</span>
  </div>
</div>

<!-- ── Tabs ── -->
<div class="max-w-7xl mx-auto px-4 pt-5">
  <div class="flex gap-2">
    <button class="tab-btn active" onclick="switchTab('stock')" id="tab-stock">📈 股票行情</button>
    <button class="tab-btn" onclick="switchTab('backtest')" id="tab-backtest">🧪 回测结果</button>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════════════════════ -->
<!-- Tab: Stock                                                                 -->
<!-- ══════════════════════════════════════════════════════════════════════════ -->
<div id="panel-stock" class="max-w-7xl mx-auto px-4 py-5">

  <!-- Search bar -->
  <div class="card p-4 mb-5">
    <div class="flex flex-col sm:flex-row gap-3">
      <!-- Code input with autocomplete -->
      <div class="relative flex-1">
        <label class="block text-xs mb-1" style="color:var(--muted);">股票代码</label>
        <input
          id="stock-input"
          class="input-field"
          placeholder="例如：SH600519、SZ000001"
          autocomplete="off"
          oninput="onCodeInput(this.value)"
          onkeydown="onCodeKeydown(event)"
        />
        <div id="autocomplete-list" class="autocomplete-list hidden scrollbar-thin"></div>
      </div>
      <!-- Date range -->
      <div class="flex gap-2">
        <div>
          <label class="block text-xs mb-1" style="color:var(--muted);">开始日期</label>
          <input id="start-date" type="date" class="input-field" value="2020-01-01" style="width:140px;" />
        </div>
        <div>
          <label class="block text-xs mb-1" style="color:var(--muted);">结束日期</label>
          <input id="end-date" type="date" class="input-field" value="" style="width:140px;" />
        </div>
      </div>
      <div class="flex items-end">
        <button class="btn-primary" onclick="loadStock()" id="load-btn">查询</button>
      </div>
    </div>

    <!-- Quick period buttons -->
    <div class="flex gap-2 mt-3 flex-wrap">
      <span class="text-xs" style="color:var(--muted);line-height:28px;">快速选择：</span>
      <button class="period-btn" onclick="setPeriod(1)">近1年</button>
      <button class="period-btn" onclick="setPeriod(3)">近3年</button>
      <button class="period-btn" onclick="setPeriod(5)">近5年</button>
      <button class="period-btn" onclick="setPeriod(10)">近10年</button>
      <button class="period-btn" onclick="setPeriod(0)">全部</button>
    </div>
  </div>

  <!-- Stock info bar -->
  <div id="stock-info" class="hidden mb-4">
    <div class="flex items-center gap-3 flex-wrap">
      <span id="info-code" class="text-lg font-bold"></span>
      <span id="info-exchange" class="tag"></span>
      <span id="info-latest-price" class="text-2xl font-bold"></span>
      <span id="info-change" class="text-sm font-semibold px-2 py-1 rounded"></span>
      <span id="info-count" class="text-xs" style="color:var(--muted);"></span>
    </div>
  </div>

  <!-- Stats row -->
  <div id="stats-row" class="hidden grid grid-cols-2 sm:grid-cols-4 gap-3 mb-5">
    <div class="stat-card">
      <div class="stat-value positive" id="stat-high">—</div>
      <div class="stat-label">区间最高</div>
    </div>
    <div class="stat-card">
      <div class="stat-value negative" id="stat-low">—</div>
      <div class="stat-label">区间最低</div>
    </div>
    <div class="stat-card">
      <div class="stat-value neutral" id="stat-return">—</div>
      <div class="stat-label">区间涨跌幅</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-vol" style="color:var(--text);">—</div>
      <div class="stat-label">平均日成交量（手）</div>
    </div>
  </div>

  <!-- Chart -->
  <div class="card p-4">
    <div id="chart-placeholder" class="flex flex-col items-center justify-center" style="height:480px;color:var(--muted);">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="mb-3 opacity-30">
        <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
        <polyline points="16 7 22 7 22 13"/>
      </svg>
      <p class="text-sm">输入股票代码后点击「查询」</p>
      <p class="text-xs mt-1 opacity-60">支持沪深北交所全部股票</p>
    </div>
    <div id="chart-loading" class="hidden flex-col items-center justify-center" style="height:480px;">
      <div class="loading-spinner mb-3"></div>
      <p class="text-sm" style="color:var(--muted);">查询中…</p>
    </div>
    <div id="chart-container" class="hidden"></div>
  </div>

</div>

<!-- ══════════════════════════════════════════════════════════════════════════ -->
<!-- Tab: Backtest                                                              -->
<!-- ══════════════════════════════════════════════════════════════════════════ -->
<div id="panel-backtest" class="max-w-7xl mx-auto px-4 py-5 hidden">

  <!-- Strategy selector -->
  <div class="card p-4 mb-5">
    <div class="flex items-center gap-3">
      <span class="text-sm" style="color:var(--muted);white-space:nowrap;">选择策略：</span>
      <div class="strategy-dropdown" id="strategy-dropdown">
        <div class="strategy-trigger" id="strategy-trigger" onclick="toggleStrategyPanel()">
          <span id="strategy-trigger-label" style="color:var(--muted);">加载中…</span>
          <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
        <div class="strategy-panel" id="strategy-panel"></div>
      </div>
    </div>
  </div>

  <!-- Backtest stats -->
  <div id="bt-stats" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3 mb-5">
    <div class="stat-card">
      <div class="stat-value positive" id="bt-total-return">—</div>
      <div class="stat-label">累计收益</div>
    </div>
    <div class="stat-card">
      <div class="stat-value positive" id="bt-annual-return">—</div>
      <div class="stat-label">年化收益</div>
    </div>
    <div class="stat-card">
      <div class="stat-value neutral" id="bt-sharpe">—</div>
      <div class="stat-label">夏普比率</div>
    </div>
    <div class="stat-card">
      <div class="stat-value negative" id="bt-max-dd">—</div>
      <div class="stat-label">最大回撤</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="bt-win-rate" style="color:var(--text);">—</div>
      <div class="stat-label">月胜率</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="bt-months" style="color:var(--text);">—</div>
      <div class="stat-label">回测月数</div>
    </div>
  </div>

  <!-- NAV Chart -->
  <div class="card p-4 mb-5">
    <h3 class="text-sm font-semibold mb-3" style="color:var(--muted);">净值曲线</h3>
    <div id="backtest-chart-container"></div>
  </div>

  <!-- Report markdown -->
  <div class="card p-5 mb-5" id="bt-report-card" style="display:none;">
    <h3 class="text-sm font-semibold mb-4" style="color:var(--muted);">📄 策略回测总结</h3>
    <div id="bt-report-content" class="md-report"></div>
  </div>

  <!-- Monthly returns calendar heatmap -->
  <div class="card p-4" id="returns-calendar-card">
    <div class="flex items-center justify-between mb-3 flex-wrap gap-2">
      <h3 class="text-sm font-semibold" style="color:var(--muted);">月度收益日历</h3>
      <!-- Row selector -->
      <div class="cal-row-tabs" id="cal-row-tabs"></div>
    </div>
    <!-- Legend -->
    <div class="cal-legend">
      <span>跌</span>
      <span class="cal-legend-swatch cal-neg-5"></span>
      <span class="cal-legend-swatch cal-neg-3"></span>
      <span class="cal-legend-swatch cal-neg-1"></span>
      <span style="width:18px;height:14px;border-radius:3px;display:inline-block;background:rgba(255,255,255,0.05);"></span>
      <span class="cal-legend-swatch cal-pos-1"></span>
      <span class="cal-legend-swatch cal-pos-3"></span>
      <span class="cal-legend-swatch cal-pos-5"></span>
      <span>涨</span>
    </div>
    <div id="returns-calendar"></div>
  </div>

</div>

<!-- ── Scripts ── -->
<script>
// ─── State ───────────────────────────────────────────────────────────────────
let stockChart = null;
let backtestChart = null;
let currentStrategy = '';
let autocompleteResults = [];
let acSelectedIndex = -1;
let acDebounceTimer = null;
let dbReady = false;

// ─── DB status check ─────────────────────────────────────────────────────────
async function pollDbStatus() {
  try {
    const res = await fetch('/api/quant/status');
    const s = await res.json();
    dbReady = s.ready;
    const banner = document.getElementById('db-banner');
    if (!dbReady) {
      // DB file not found — show persistent error banner
      banner.style.display = 'block';
      document.getElementById('db-progress-text').textContent = '数据库未就绪，请先运行: node scripts/import_stocks_to_sqlite.mjs';
      document.getElementById('db-progress-bar').style.width = '0%';
    } else {
      // SQLite is ready instantly — update header stock count
      const countEl = document.querySelector('header .text-xs.px-2.py-1.rounded');
      if (countEl && s.stockCount > 0) {
        countEl.textContent = `● ${s.stockCount.toLocaleString()} 只股票`;
      }
      banner.style.display = 'none';
    }
  } catch {
    setTimeout(pollDbStatus, 3000);
  }
}
pollDbStatus();

// ─── Tab switching ────────────────────────────────────────────────────────────
function switchTab(tab) {
  ['stock', 'backtest'].forEach(t => {
    document.getElementById(`panel-${t}`).classList.toggle('hidden', t !== tab);
    document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
  });
  if (tab === 'backtest' && !currentStrategy) {
    loadStrategies();
  }
}

// ─── Date helpers ─────────────────────────────────────────────────────────────
function setPeriod(years) {
  const end = new Date();
  document.getElementById('end-date').value = end.toISOString().slice(0, 10);
  if (years === 0) {
    document.getElementById('start-date').value = '2006-01-01';
  } else {
    const start = new Date(end);
    start.setFullYear(start.getFullYear() - years);
    document.getElementById('start-date').value = start.toISOString().slice(0, 10);
  }
}

// Set default end date to today
(function() {
  document.getElementById('end-date').value = new Date().toISOString().slice(0, 10);
})();

// ─── Autocomplete ─────────────────────────────────────────────────────────────
function onCodeInput(val) {
  clearTimeout(acDebounceTimer);
  hideAutocomplete();
  if (val.length < 2) return;
  acDebounceTimer = setTimeout(() => fetchAutocomplete(val), 300);
}

async function fetchAutocomplete(q) {
  try {
    const res = await fetch(`/api/quant/stock/search?q=${encodeURIComponent(q)}`);
    const data = await res.json();
    autocompleteResults = data.results || [];
    renderAutocomplete();
  } catch {}
}

function renderAutocomplete() {
  const list = document.getElementById('autocomplete-list');
  if (!autocompleteResults.length) { hideAutocomplete(); return; }
  list.innerHTML = autocompleteResults.map((code, i) => {
    const exchange = code.slice(0, 2);
    const tagClass = exchange === 'SH' ? 'tag-sh' : exchange === 'SZ' ? 'tag-sz' : 'tag-bj';
    return `<div class="autocomplete-item" onclick="selectCode('${code}')" data-index="${i}">
      <span class="tag ${tagClass} mr-2">${exchange}</span>${code.slice(2)}
    </div>`;
  }).join('');
  list.classList.remove('hidden');
  acSelectedIndex = -1;
}

function hideAutocomplete() {
  document.getElementById('autocomplete-list').classList.add('hidden');
  acSelectedIndex = -1;
}

function selectCode(code) {
  document.getElementById('stock-input').value = code;
  hideAutocomplete();
}

function onCodeKeydown(e) {
  const list = document.getElementById('autocomplete-list');
  if (list.classList.contains('hidden')) {
    if (e.key === 'Enter') loadStock();
    return;
  }
  const items = list.querySelectorAll('.autocomplete-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    acSelectedIndex = Math.min(acSelectedIndex + 1, items.length - 1);
    updateAcHighlight(items);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    acSelectedIndex = Math.max(acSelectedIndex - 1, -1);
    updateAcHighlight(items);
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (acSelectedIndex >= 0) {
      selectCode(autocompleteResults[acSelectedIndex]);
    } else {
      hideAutocomplete();
      loadStock();
    }
  } else if (e.key === 'Escape') {
    hideAutocomplete();
  }
}

function updateAcHighlight(items) {
  items.forEach((el, i) => {
    el.style.background = i === acSelectedIndex ? 'var(--border)' : '';
  });
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('#stock-input') && !e.target.closest('#autocomplete-list')) {
    hideAutocomplete();
  }
});

// ─── Load stock data ──────────────────────────────────────────────────────────
async function loadStock() {
  const code = document.getElementById('stock-input').value.trim();
  if (!code) { alert('请输入股票代码'); return; }
  if (!dbReady) { alert('数据库仍在加载中，请稍候再试…'); return; }

  const start = document.getElementById('start-date').value;
  const end = document.getElementById('end-date').value;

  // Show loading
  document.getElementById('chart-placeholder').classList.add('hidden');
  document.getElementById('chart-loading').classList.remove('hidden');
  document.getElementById('chart-loading').classList.add('flex');
  document.getElementById('chart-container').classList.add('hidden');
  document.getElementById('stock-info').classList.add('hidden');
  document.getElementById('stats-row').classList.add('hidden');
  document.getElementById('load-btn').disabled = true;

  try {
    let url = `/api/quant/stock/kline?code=${encodeURIComponent(code)}`;
    if (start) url += `&start=${start}`;
    if (end) url += `&end=${end}`;

    const res = await fetch(url);
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error || `HTTP ${res.status}`);
    }
    const result = await res.json();
    renderStockChart(result);
  } catch (err) {
    document.getElementById('chart-loading').classList.add('hidden');
    document.getElementById('chart-loading').classList.remove('flex');
    document.getElementById('chart-placeholder').classList.remove('hidden');
    document.getElementById('chart-placeholder').innerHTML = `
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="mb-3 opacity-30">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <p class="text-sm text-red-400">加载失败：${err.message}</p>
      <p class="text-xs mt-1 opacity-60">请检查股票代码格式，如 SH600519</p>
    `;
  } finally {
    document.getElementById('load-btn').disabled = false;
  }
}

function renderStockChart(result) {
  const { code, data } = result;
  if (!data || data.length === 0) {
    throw new Error('无数据');
  }

  // Hide loading, show chart
  document.getElementById('chart-loading').classList.add('hidden');
  document.getElementById('chart-loading').classList.remove('flex');
  document.getElementById('chart-container').classList.remove('hidden');

  // Compute stats
  const closes = data.map(d => d.close);
  const highs = data.map(d => d.high);
  const lows = data.map(d => d.low);
  const vols = data.map(d => d.volume);
  const maxHigh = Math.max(...highs);
  const minLow = Math.min(...lows);
  const firstClose = closes[0];
  const lastClose = closes[closes.length - 1];
  const totalReturn = ((lastClose - firstClose) / firstClose * 100).toFixed(2);
  const avgVol = (vols.reduce((a, b) => a + b, 0) / vols.length).toFixed(0);
  const dayChange = data.length >= 2
    ? ((lastClose - closes[closes.length - 2]) / closes[closes.length - 2] * 100).toFixed(2)
    : '0.00';

  // Info bar
  const exchange = code.slice(0, 2);
  const tagClass = exchange === 'SH' ? 'tag-sh' : exchange === 'SZ' ? 'tag-sz' : 'tag-bj';
  document.getElementById('info-code').textContent = code;
  document.getElementById('info-exchange').className = `tag ${tagClass}`;
  document.getElementById('info-exchange').textContent = exchange;
  document.getElementById('info-latest-price').textContent = lastClose.toFixed(2);
  const changeEl = document.getElementById('info-change');
  const isPos = parseFloat(dayChange) >= 0;
  changeEl.textContent = `${isPos ? '+' : ''}${dayChange}%`;
  changeEl.style.background = isPos ? 'rgba(239,68,68,0.15)' : 'rgba(16,185,129,0.15)';
  changeEl.style.color = isPos ? 'var(--green)' : 'var(--red)';
  document.getElementById('info-count').textContent = `共 ${data.length} 个交易日`;
  document.getElementById('stock-info').classList.remove('hidden');

  // Stats
  document.getElementById('stat-high').textContent = maxHigh.toFixed(2);
  document.getElementById('stat-low').textContent = minLow.toFixed(2);
  const retEl = document.getElementById('stat-return');
  retEl.textContent = `${parseFloat(totalReturn) >= 0 ? '+' : ''}${totalReturn}%`;
  retEl.className = `stat-value ${parseFloat(totalReturn) >= 0 ? 'positive' : 'negative'}`;
  document.getElementById('stat-vol').textContent = parseInt(avgVol).toLocaleString();
  document.getElementById('stats-row').classList.remove('hidden');

  // ECharts K-line
  const dates = data.map(d => d.date);
  const kData = data.map(d => [d.open, d.close, d.low, d.high]);
  const volData = data.map(d => ({
    value: d.volume,
    itemStyle: { color: d.close >= d.open ? 'var(--green)' : 'var(--red)' }
  }));

  if (!stockChart) {
    stockChart = echarts.init(document.getElementById('chart-container'), 'dark');
    window.addEventListener('resize', () => stockChart && stockChart.resize());
  }

  const option = {
    backgroundColor: 'transparent',
    animation: false,
    tooltip: {
      trigger: 'axis',
      axisPointer: { type: 'cross' },
      backgroundColor: '#1a1d27',
      borderColor: '#2e3347',
      textStyle: { color: '#e2e8f0', fontSize: 12 },
      formatter: (params) => {
        const k = params.find(p => p.seriesName === 'K线');
        const v = params.find(p => p.seriesName === '成交量');
        if (!k) return '';
        const [o, c, l, h] = k.value;
        const chg = ((c - o) / o * 100).toFixed(2);
        const color = c >= o ? '#ef4444' : '#10b981';
        return `<div style="font-size:12px;">
          <div style="color:#64748b;margin-bottom:4px;">${k.axisValue}</div>
          <div>开 <b style="color:${color}">${o.toFixed(2)}</b>　
               收 <b style="color:${color}">${c.toFixed(2)}</b></div>
          <div>高 <b style="color:#ef4444">${h.toFixed(2)}</b>　
               低 <b style="color:#10b981">${l.toFixed(2)}</b></div>
          <div>涨跌 <b style="color:${color}">${chg}%</b></div>
          ${v ? `<div>量 <b>${v.value.toLocaleString()}</b> 手</div>` : ''}
        </div>`;
      }
    },
    legend: { show: false },
    grid: [
      { left: 60, right: 20, top: 20, bottom: 120 },
      { left: 60, right: 20, height: 60, bottom: 40 }
    ],
    xAxis: [
      {
        type: 'category', data: dates, gridIndex: 0,
        axisLine: { lineStyle: { color: '#2e3347' } },
        axisLabel: { color: '#64748b', fontSize: 11 },
        splitLine: { show: false },
        axisPointer: { label: { show: false } }
      },
      {
        type: 'category', data: dates, gridIndex: 1,
        axisLine: { lineStyle: { color: '#2e3347' } },
        axisLabel: { show: false },
        splitLine: { show: false }
      }
    ],
    yAxis: [
      {
        scale: true, gridIndex: 0,
        axisLine: { lineStyle: { color: '#2e3347' } },
        axisLabel: { color: '#64748b', fontSize: 11 },
        splitLine: { lineStyle: { color: '#1e2235' } }
      },
      {
        scale: true, gridIndex: 1,
        axisLine: { lineStyle: { color: '#2e3347' } },
        axisLabel: { color: '#64748b', fontSize: 10 },
        splitLine: { show: false }
      }
    ],
    dataZoom: [
      {
        type: 'inside', xAxisIndex: [0, 1],
        start: Math.max(0, 100 - Math.min(100, 12000 / data.length * 100)),
        end: 100
      },
      {
        type: 'slider', xAxisIndex: [0, 1],
        bottom: 5, height: 28,
        borderColor: '#2e3347',
        fillerColor: 'rgba(99,102,241,0.15)',
        handleStyle: { color: '#6366f1' },
        textStyle: { color: '#64748b', fontSize: 10 },
        start: Math.max(0, 100 - Math.min(100, 12000 / data.length * 100)),
        end: 100
      }
    ],
    series: [
      {
        name: 'K线', type: 'candlestick',
        xAxisIndex: 0, yAxisIndex: 0,
        data: kData,
        itemStyle: {
          color: '#ef4444', color0: '#10b981',
          borderColor: '#ef4444', borderColor0: '#10b981'
        }
      },
      {
        name: '成交量', type: 'bar',
        xAxisIndex: 1, yAxisIndex: 1,
        data: volData,
        barMaxWidth: 6
      }
    ]
  };

  stockChart.setOption(option, true);
}

// ─── Backtest ─────────────────────────────────────────────────────────────────
// Cache for strategy annual returns: { strategyKey: annualReturnStr }
const strategyAnnualCache = {};

function toggleStrategyPanel() {
  const trigger = document.getElementById('strategy-trigger');
  const panel = document.getElementById('strategy-panel');
  const isOpen = panel.classList.contains('open');
  if (isOpen) {
    panel.classList.remove('open');
    trigger.classList.remove('open');
  } else {
    panel.classList.add('open');
    trigger.classList.add('open');
  }
}

function closeStrategyPanel() {
  document.getElementById('strategy-panel').classList.remove('open');
  document.getElementById('strategy-trigger').classList.remove('open');
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('#strategy-dropdown')) closeStrategyPanel();
});

// Annual return is now extracted directly from renderBacktest result (same formula as stat card)
function calcAnnualReturn(navData) {
  if (!navData || navData.length < 2) return null;
  const lastNav   = parseFloat(navData[navData.length - 1].nav || navData[navData.length - 1].strategy || 0);
  const firstDate = new Date(navData[0].date);
  const lastDate  = new Date(navData[navData.length - 1].date);
  const years = (lastDate - firstDate) / (365.25 * 24 * 3600 * 1000);
  if (years <= 0 || lastNav <= 0) return null;
  // Same formula as renderBacktest: assume initial nav = 1
  return ((Math.pow(lastNav, 1 / years) - 1) * 100).toFixed(1);
}

function renderStrategyPanel(strategies) {
  const panel = document.getElementById('strategy-panel');
  panel.innerHTML = strategies.map(s => {
    const annual = strategyAnnualCache[s];
    let annualHtml = '';
    if (annual === undefined) {
      annualHtml = `<span class="s-annual loading">计算中…</span>`;
    } else if (annual === null) {
      annualHtml = `<span class="s-annual loading">—</span>`;
    } else {
      const num = parseFloat(annual);
      const cls = num >= 0 ? 'pos' : 'neg';
      const sign = num >= 0 ? '+' : '';
      annualHtml = `<span class="s-annual ${cls}">${sign}${annual}% 年化</span>`;
    }
    const isActive = s === currentStrategy;
    return `<div class="strategy-item${isActive ? ' active' : ''}" onclick="selectStrategy('${s}')">
      <span class="s-name">${strategyLabel(s)}</span>
      <div class="s-annual-row">${annualHtml}</div>
    </div>`;
  }).join('');
}

function updateTriggerLabel(strategy) {
  const label = document.getElementById('strategy-trigger-label');
  const annual = strategyAnnualCache[strategy];
  let annualText = '';
  if (annual !== undefined && annual !== null) {
    const num = parseFloat(annual);
    const sign = num >= 0 ? '+' : '';
    annualText = `  ${sign}${annual}%`;
  }
  label.innerHTML = `<span style="color:var(--text);font-weight:500;">${strategyLabel(strategy)}</span>`
    + (annualText ? `<span style="font-size:13px;font-weight:700;margin-left:10px;color:${parseFloat(annual)>=0?'var(--green)':'var(--red)'}">${annualText} 年化</span>` : '');
}

function selectStrategy(s) {
  closeStrategyPanel();
  loadBacktest(s);
}

let _allStrategies = [];

async function loadStrategies() {
  try {
    const res = await fetch('/api/quant/strategies');
    const data = await res.json();
    _allStrategies = data.strategies;

    // Show panel with loading placeholders
    renderStrategyPanel(_allStrategies);
    const trigger = document.getElementById('strategy-trigger');
    const label = document.getElementById('strategy-trigger-label');
    if (_allStrategies.length > 0) {
      label.textContent = strategyLabel(_allStrategies[0]);
    }

    // Load first strategy immediately
    if (_allStrategies.length > 0) {
      loadBacktest(_allStrategies[0]);
    }

    // Prefetch annual returns for all strategies in background
    _allStrategies.forEach(async (s) => {
      try {
        const r = await fetch(`/api/quant/backtest?strategy=${s}`);
        const d = await r.json();
        strategyAnnualCache[s] = calcAnnualReturn(d.nav);
      } catch {
        strategyAnnualCache[s] = null;
      }
      // Re-render panel and trigger label
      renderStrategyPanel(_allStrategies);
      if (s === currentStrategy) updateTriggerLabel(s);
    });
  } catch (err) {
    console.error(err);
  }
}

function strategyLabel(s) {
  const map = { momentum: '动量因子', multifactor: '多因子组合' };
  return map[s] || s;
}

async function loadBacktest(strategy) {
  currentStrategy = strategy;
  // Update trigger label immediately
  updateTriggerLabel(strategy);
  // Re-render panel to reflect active state
  renderStrategyPanel(_allStrategies);
  try {
    const res = await fetch(`/api/quant/backtest?strategy=${strategy}`);
    const data = await res.json();
    renderBacktest(data);
  } catch (err) {
    console.error(err);
  }
}

function renderBacktest(data) {
  const { nav, returns } = data;
  if (!nav || nav.length === 0) return;

  // Compute stats from NAV
  const navValues = nav.map(r => parseFloat(r.nav || r.strategy || 0));
  const lastNav = navValues[navValues.length - 1];
  const firstNav = navValues[0];
  const totalReturn = ((lastNav - 1) * 100).toFixed(1);

  // Annualized return
  const firstDate = new Date(nav[0].date);
  const lastDate = new Date(nav[nav.length - 1].date);
  const years = (lastDate - firstDate) / (365.25 * 24 * 3600 * 1000);
  const annualReturn = ((Math.pow(lastNav, 1 / years) - 1) * 100).toFixed(1);

  // Sync annual return to dropdown cache
  if (strategyAnnualCache[currentStrategy] === undefined || strategyAnnualCache[currentStrategy] !== annualReturn) {
    strategyAnnualCache[currentStrategy] = annualReturn;
    renderStrategyPanel(_allStrategies);
    updateTriggerLabel(currentStrategy);
  }

  // Max drawdown
  let maxDD = 0, peak = navValues[0];
  navValues.forEach(v => {
    if (v > peak) peak = v;
    const dd = (peak - v) / peak;
    if (dd > maxDD) maxDD = dd;
  });

  // Monthly returns stats — port_ret is a decimal fraction (e.g. 0.05 = 5%)
  const monthlyRets = returns.map(r => parseFloat(r.port_ret) || 0);
  const winRate = monthlyRets.length > 0
    ? (monthlyRets.filter(r => r > 0).length / monthlyRets.length * 100).toFixed(1)
    : '—';

  // Sharpe (annualised from monthly returns, risk-free ≈ 0)
  let sharpe = '—';
  if (monthlyRets.length > 2) {
    const mean = monthlyRets.reduce((a, b) => a + b, 0) / monthlyRets.length;
    const std = Math.sqrt(monthlyRets.map(r => (r - mean) ** 2).reduce((a, b) => a + b, 0) / monthlyRets.length);
    if (std > 0) sharpe = (mean / std * Math.sqrt(12)).toFixed(2);
  }

  const totalReturnNum = parseFloat(totalReturn);
  const annualReturnNum = parseFloat(annualReturn);
  document.getElementById('bt-total-return').textContent = `${totalReturnNum >= 0 ? '+' : ''}${totalReturn}%`;
  document.getElementById('bt-total-return').className = `stat-value ${totalReturnNum >= 0 ? 'positive' : 'negative'}`;
  document.getElementById('bt-annual-return').textContent = `${annualReturnNum >= 0 ? '+' : ''}${annualReturn}%`;
  document.getElementById('bt-annual-return').className = `stat-value ${annualReturnNum >= 0 ? 'positive' : 'negative'}`;
  document.getElementById('bt-sharpe').textContent = sharpe;
  document.getElementById('bt-max-dd').textContent = `-${(maxDD * 100).toFixed(1)}%`;
  document.getElementById('bt-win-rate').textContent = `${winRate}%`;
  document.getElementById('bt-months').textContent = nav.length;

  // NAV chart
  if (!backtestChart) {
    backtestChart = echarts.init(document.getElementById('backtest-chart-container'), 'dark');
    window.addEventListener('resize', () => backtestChart && backtestChart.resize());
  }

  const dates = nav.map(r => r.date);
  const strategyNav = nav.map(r => parseFloat(r.nav || r.strategy || 0).toFixed(4));
  const benchmarkNav = nav.map(r => r.benchmark ? parseFloat(r.benchmark).toFixed(4) : null);
  const hasBenchmark = benchmarkNav.some(v => v !== null);

  const benchmark2Nav = nav.map(r => r.benchmark2 ? parseFloat(r.benchmark2).toFixed(4) : null);
  const hasBenchmark2 = benchmark2Nav.some(v => v !== null);

  const series = [
    {
      name: '策略净值', type: 'line', data: strategyNav,
      smooth: false, symbol: 'none',
      lineStyle: { color: '#6366f1', width: 2 },
      areaStyle: { color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1,
        colorStops: [{ offset: 0, color: 'rgba(99,102,241,0.3)' }, { offset: 1, color: 'rgba(99,102,241,0)' }]
      }}
    }
  ];

  if (hasBenchmark) {
    series.push({
      name: '基准净值', type: 'line', data: benchmarkNav,
      smooth: false, symbol: 'none',
      lineStyle: { color: '#64748b', width: 1.5, type: 'dashed' }
    });
  }

  if (hasBenchmark2) {
    series.push({
      name: '基准2净值', type: 'line', data: benchmark2Nav,
      smooth: false, symbol: 'none',
      lineStyle: { color: '#f59e0b', width: 1.5, type: 'dotted' }
    });
  }

  const legendData = ['策略净值'];
  if (hasBenchmark) legendData.push('基准净值');
  if (hasBenchmark2) legendData.push('基准2净值');

  backtestChart.setOption({
    backgroundColor: 'transparent',
    animation: false,
    tooltip: {
      trigger: 'axis',
      backgroundColor: '#1a1d27',
      borderColor: '#2e3347',
      textStyle: { color: '#e2e8f0', fontSize: 12 },
    },
    legend: {
      data: legendData,
      textStyle: { color: '#64748b' },
      top: 0
    },
    grid: { left: 60, right: 20, top: 40, bottom: 50 },
    xAxis: {
      type: 'category', data: dates,
      axisLine: { lineStyle: { color: '#2e3347' } },
      axisLabel: { color: '#64748b', fontSize: 11 },
      splitLine: { show: false }
    },
    yAxis: {
      scale: true,
      axisLine: { lineStyle: { color: '#2e3347' } },
      axisLabel: { color: '#64748b', fontSize: 11 },
      splitLine: { lineStyle: { color: '#1e2235' } }
    },
    dataZoom: [
      { type: 'inside', start: 0, end: 100 },
      { type: 'slider', bottom: 5, height: 24, borderColor: '#2e3347',
        fillerColor: 'rgba(99,102,241,0.15)', handleStyle: { color: '#6366f1' },
        textStyle: { color: '#64748b', fontSize: 10 } }
    ],
    series
  }, true);

  // Monthly returns calendar heatmap
  const hasBench  = returns.some(r => r.bench_ret  != null && r.bench_ret  !== '');
  const hasBench2 = returns.some(r => r.bench2_ret != null && r.bench2_ret !== '');

  // Build row options
  const calRowOptions = [{ key: 'port_ret', label: '策略收益' }];
  if (hasBench)  calRowOptions.push({ key: 'bench_ret',  label: '基准收益' });
  if (hasBench)  calRowOptions.push({ key: 'excess',     label: '超额收益' });
  if (hasBench2) calRowOptions.push({ key: 'bench2_ret', label: '基准2收益' });
  if (hasBench2) calRowOptions.push({ key: 'excess2',    label: '超额2' });

  // Render row selector tabs
  let activeCalRow = calRowOptions[0].key;
  const tabsEl = document.getElementById('cal-row-tabs');
  tabsEl.innerHTML = calRowOptions.map(opt =>
    `<button class="cal-row-tab${opt.key === activeCalRow ? ' active' : ''}" onclick="switchCalRow('${opt.key}')">${opt.label}</button>`
  ).join('');

  // Parse returns into a map: { 'YYYY-MM': { port_ret, bench_ret, excess, bench2_ret, excess2 } }
  window._calReturns = {};
  returns.forEach(r => {
    const stratRaw  = parseFloat(r.port_ret) || 0;
    const benchRaw  = r.bench_ret  != null && r.bench_ret  !== '' ? parseFloat(r.bench_ret)  : null;
    const excessRaw = r.excess     != null && r.excess     !== '' ? parseFloat(r.excess)
                    : (benchRaw != null ? stratRaw - benchRaw : null);
    const bench2Raw = r.bench2_ret != null && r.bench2_ret !== '' ? parseFloat(r.bench2_ret) : null;
    const excess2Raw= r.excess2    != null && r.excess2    !== '' ? parseFloat(r.excess2)
                    : (bench2Raw != null ? stratRaw - bench2Raw : null);
    // Key by YYYY-MM (use the date string's first 7 chars)
    const key = r.date.slice(0, 7);
    // If multiple entries per month, accumulate (sum)
    if (!window._calReturns[key]) {
      window._calReturns[key] = { port_ret: stratRaw, bench_ret: benchRaw, excess: excessRaw, bench2_ret: bench2Raw, excess2: excess2Raw };
    } else {
      const e = window._calReturns[key];
      e.port_ret  += stratRaw;
      if (benchRaw  != null) e.bench_ret  = (e.bench_ret  || 0) + benchRaw;
      if (excessRaw != null) e.excess     = (e.excess     || 0) + excessRaw;
      if (bench2Raw != null) e.bench2_ret = (e.bench2_ret || 0) + bench2Raw;
      if (excess2Raw!= null) e.excess2    = (e.excess2    || 0) + excess2Raw;
    }
  });

  window._calRowOptions = calRowOptions;
  window.switchCalRow = function(key) {
    activeCalRow = key;
    // Update tab active state
    document.querySelectorAll('.cal-row-tab').forEach(btn => {
      btn.classList.toggle('active', btn.textContent === calRowOptions.find(o => o.key === key)?.label);
    });
    renderCalendar(key);
  };

  function getCellClass(val) {
    if (val == null) return 'empty';
    const pct = val * 100;
    if (pct >= 0) {
      if (pct < 1)   return 'cal-pos-1';
      if (pct < 2.5) return 'cal-pos-2';
      if (pct < 5)   return 'cal-pos-3';
      if (pct < 8)   return 'cal-pos-4';
      return 'cal-pos-5';
    } else {
      if (pct > -1)   return 'cal-neg-1';
      if (pct > -2.5) return 'cal-neg-2';
      if (pct > -5)   return 'cal-neg-3';
      if (pct > -8)   return 'cal-neg-4';
      return 'cal-neg-5';
    }
  }

  function renderCalendar(rowKey) {
    const calEl = document.getElementById('returns-calendar');
    const allKeys = Object.keys(window._calReturns).sort();
    if (!allKeys.length) { calEl.innerHTML = ''; return; }

    const years = [...new Set(allKeys.map(k => k.slice(0, 4)))].sort().reverse();
    const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

    let html = '';
    years.forEach(year => {
      // Year total
      let yearTotal = 0, yearCount = 0;
      for (let m = 1; m <= 12; m++) {
        const mk = `${year}-${String(m).padStart(2,'0')}`;
        const entry = window._calReturns[mk];
        if (entry && entry[rowKey] != null) { yearTotal += entry[rowKey]; yearCount++; }
      }
      const yearPct = yearCount > 0 ? (yearTotal * 100).toFixed(1) : null;
      const yearSign = yearPct != null && parseFloat(yearPct) >= 0 ? '+' : '';
      const yearColor = yearPct != null ? (parseFloat(yearPct) >= 0 ? 'var(--green)' : 'var(--red)') : 'var(--muted)';

      html += `<div class="cal-year-block">`;
      html += `<div class="cal-year-label">${year}年`
            + (yearPct != null ? ` <span style="font-size:12px;color:${yearColor};">${yearSign}${yearPct}%</span>` : '')
            + `</div>`;

      // Header row
      html += `<div class="cal-grid">`;
      html += `<div class="cal-header-cell"></div>`; // row label placeholder
      MONTHS.forEach(m => html += `<div class="cal-header-cell">${m}</div>`);
      html += `</div>`;

      // Data row
      html += `<div class="cal-grid">`;
      html += `<div class="cal-row-label">${year}</div>`;
      for (let m = 1; m <= 12; m++) {
        const mk = `${year}-${String(m).padStart(2,'0')}`;
        const entry = window._calReturns[mk];
        const val = entry ? entry[rowKey] : null;
        const cls = getCellClass(val);
        const pctStr = val != null ? `${val >= 0 ? '+' : ''}${(val * 100).toFixed(1)}%` : '';
        const title = val != null ? `${mk}\n${calRowOptions.find(o=>o.key===rowKey)?.label}: ${pctStr}` : mk;
        html += `<div class="cal-cell ${cls}" title="${title}">${pctStr}</div>`;
      }
      html += `</div>`; // end grid
      html += `</div>`; // end year-block
    });

    calEl.innerHTML = html;
  }

  renderCalendar(activeCalRow);

  // Report markdown
  const reportCard = document.getElementById('bt-report-card');
  const reportContent = document.getElementById('bt-report-content');
  if (data.report) {
    reportContent.innerHTML = marked.parse(data.report);
    reportCard.style.display = 'block';
  } else {
    reportCard.style.display = 'none';
  }
}
</script>

</body>
</html>
